version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devguard_pass}
      POSTGRES_DB: ${POSTGRES_DB:-devguard_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-devguard}']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-devguard}:${POSTGRES_PASSWORD:-devguard_pass}@postgres:5432/${POSTGRES_DB:-devguard_db}

  worker:
    build:
      context: ./worker
      dockerfile: ../docker/worker.Dockerfile
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-devguard}:${POSTGRES_PASSWORD:-devguard_pass}@postgres:5432/${POSTGRES_DB:-devguard_db}

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  postgres_data:
